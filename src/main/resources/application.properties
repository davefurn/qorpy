spring.application.name=api
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
server.port=8081
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
app.jwt.expiration-ms=600000
app.jwt.warning-before-ms=120000
app.security.max-failed-attempts=5
app.security.lockout-duration-minutes=15
app.alerts.evaluation-cron=0 */5 * * * *
app.alerts.notification-retention-days=90
logging.level.root=INFO
logging.level.com.qucoon.qorpy=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG
server.forward-headers-strategy=framework
springdoc.model-and-view-allowed=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.jwt.secret=${JWT_SECRET}
app.resend.api-key=${RESEND_API_KEY}
app.mail.from=noreply@univaciti.com